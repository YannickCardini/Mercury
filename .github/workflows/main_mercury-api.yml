# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - mercury-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # npm ci installe toutes les dépendances des workspaces (shared, backend, frontend)
      - name: Install workspace dependencies
        run: npm ci

      # Doit être buildé EN PREMIER — backend et frontend en dépendent via @mercury/shared
      - name: Build @mercury/shared
        run: npm run build:shared

      - name: Build backend
        run: npm run build --workspace=backend

      # Crée un package de déploiement minimal pour Azure :
      # - dist/              : code backend compilé
      # - node_modules/@mercury/shared : pré-résolu pour éviter les problèmes de workspaces
      # - package.json       : basé sur backend, sans @mercury/shared (déjà placé), avec start script
      #
      # Azure Oryx lancera ensuite `npm install` (pour express, cors, ws, etc.) puis `npm start`
      - name: Prepare deployment package
        run: |
          mkdir -p deploy/node_modules/@mercury/shared

          cp -r backend/dist deploy/dist

          cp -r packages/shared/dist deploy/node_modules/@mercury/shared/dist
          cp packages/shared/package.json deploy/node_modules/@mercury/shared/package.json

          jq 'del(.dependencies["@mercury/shared"]) | .scripts = {"start": "node dist/index.js"}' \
            backend/package.json > deploy/package.json

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B718C9C1CABA4B34801B88EE9FF6844D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C9216ADC46FB4139AFC0AA0422F137F8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5289A3D2FC70407B9A0D2F8E648F5F9C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mercury-api'
          slot-name: 'Production'
          package: .
