name: B&D backend to Azure Web App 🖧

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x' # Plus stable pour Azure

      - name: npm install and build
        run: |
          cd backend  # On entre dans le dossier backend
          npm install
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # On n'envoie que le dossier backend compilé pour ne pas surcharger le déploiement
          path: backend/ 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1A5C3958CC71423FA3C5C7D03E47C4C0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A6CF99F7E9B44F87A1F6116776639895 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6EF14047979F4BFFBD0876E6B4AAF9D9 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'keenzen-api'
          slot-name: 'Production'
          package: . # Le package est déjà le contenu de /backend grâce à l'étape upload