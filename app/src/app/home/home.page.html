<ion-content [fullscreen]="true" class="grid-container">
  @if (gameStateService.data(); as gameData) {
  <div class="game-layout wooden-background-realistic">
    <div class="board-wrapper">
      <app-board></app-board>
    </div>
    <div class="table-wrapper">
      <app-table></app-table>
    </div>
  </div>
  } @else {
  <div class="empty-state">Attente des données...</div>
  }
</ion-content>
