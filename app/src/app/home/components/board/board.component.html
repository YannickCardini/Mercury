<div class="square-grid" [style.--square-size.px]="squareSize">
  @for (row of rows; track row) {
  <div class="grid-row">
    @for (col of cols; track col) {
    <div class="grid-col">
      @if(shouldDisplayThisSquare(row, col)){
      <div class="case" [style.background-color]="getPlayerColorAtPosition(row, col)">{{ getSquareIndex(row, col) }}
      </div>
      }@else{
      <div class="case-hidden"></div>
      }
    </div>
    }
  </div>
  }
</div>
