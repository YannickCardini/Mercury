<div class="loading-screen">
  <!-- Titre du jeu -->
  <div class="loading-title">
    <span class="title-letter" style="--i:0">K</span>
    <span class="title-letter" style="--i:1">E</span>
    <span class="title-letter" style="--i:2">E</span>
    <span class="title-letter" style="--i:3">N</span>
    <span class="title-letter" style="--i:4">Z</span>
    <span class="title-letter" style="--i:5">E</span>
    <span class="title-letter" style="--i:6">N</span>
  </div>

  <!-- Billes en orbite (les 4 couleurs du jeu) -->
  <div class="marble-orbit">
    <div class="orbit-ring">
      <div class="orbit-marble marble-red" style="--orbit-delay: 0s"></div>
      <div class="orbit-marble marble-green" style="--orbit-delay: -1.5s"></div>
      <div class="orbit-marble marble-blue" style="--orbit-delay: -3s"></div>
      <div class="orbit-marble marble-orange" style="--orbit-delay: -4.5s"></div>
    </div>
    <!-- Étoile centrale qui pulse -->
    <div class="orbit-center">
      <div class="orbit-center-core"></div>
    </div>
  </div>

  <!-- Message statut -->
  <p class="loading-status">{{ status }}</p>

  <!-- Points de chargement -->
  <div class="loading-dots">
    <span style="--d:0s"></span>
    <span style="--d:0.2s"></span>
    <span style="--d:0.4s"></span>
  </div>
</div>
