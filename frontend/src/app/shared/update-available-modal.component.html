<!-- Mandatory update: no way to close (no close button, overlay not clickable). -->
<div class="update-overlay" [class.active]="show">
  <div class="update-card">

    <div class="update-header">
      <div class="update-marbles">
        <span class="mm mm-red"></span>
        <span class="mm mm-green"></span>
        <span class="mm mm-blue"></span>
        <span class="mm mm-orange"></span>
      </div>
      <h2 class="update-title">Update Required</h2>
      <p class="update-subtitle">Mercury — Tock Board Game</p>
    </div>

    <div class="update-body">
      <p class="update-message">
        A new version of Mercury is available. You must update the app to continue
        playing.
      </p>
      <button class="update-btn" (click)="openStore()">Update</button>
    </div>

  </div>
</div>
