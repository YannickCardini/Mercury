@if (hint(); as h) {
<div class="tutorial-overlay">

  @for (rect of highlightRects(); track $index) {
  <div class="hint-highlight" [class]="'highlight-' + h.anchor" [style.left.px]="rect.left" [style.top.px]="rect.top"
    [style.width.px]="rect.width" [style.height.px]="rect.height"
    [style.transform]="rect.rotation ? 'rotate(' + rect.rotation + 'deg)' : null"></div>
  }

  @if (pillPosition(); as pos) {
  <div class="hint-pill" [class]="'anchor-' + h.anchor"
    [style.left.px]="pos.left" [style.top.px]="pos.top"
    [style.--arrow-shift]="pos.arrowShift + 'px'">
    <span class="hint-text">{{ h.text }}</span>
    <span class="hint-arrow" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19" />
        <polyline points="6 13 12 19 18 13" />
      </svg>
    </span>
  </div>
  }

</div>
}
