<div class="grid-container">

  <!-- ═══════════════════════════════════════════════════════════
       ÉCRAN DE CHARGEMENT — visible tant qu'aucune donnée n'est reçue
       ═══════════════════════════════════════════════════════════ -->
  @if (!gameStateService.data()) {
  <app-loading-screen [status]="loadingStatus()"></app-loading-screen>
  }

  <!-- ═══════════════════════════════════════════════════════════
       JEU PRINCIPAL
       ═══════════════════════════════════════════════════════════ -->
  @if (gameStateService.data(); as gameData) {
  <div class="game-layout">

    <!-- OVERLAY NOUVEAU TOUR -->
    @if (showNewTurnBanner()) {
    <div class="new-turn-overlay" [attr.data-color]="newTurnColor()">
      <div class="new-turn-banner">
        <div class="new-turn-avatar-wrapper">
          @if (newTurnPicture(); as pic) {
            <img class="new-turn-avatar" [src]="pic" alt="" referrerpolicy="no-referrer" />
          } @else {
            <div class="new-turn-marble" [class]="'ntm-' + newTurnColor()"></div>
          }
        </div>
        <div class="new-turn-text">
          <span class="new-turn-label">Nouveau Tour</span>
          <span class="new-turn-name">{{ newTurnName() }}</span>
        </div>
      </div>
    </div>
    }

    <div class="board-wrapper">
      <app-board #board></app-board>
    </div>
    <div class="table-wrapper" [style.height.px]="gameStateService.boardContainerSize()"
      [style.width.px]="gameStateService.boardContainerSize()">
      <app-table (rulesRequested)="showRules.set(true)"></app-table>
    </div>
  </div>
  }

  <!-- ═══════════════════════════════════════════════════════════
       ÉCRAN DE VICTOIRE
       ═══════════════════════════════════════════════════════════ -->
  <app-game-rules-modal [show]="showRules()" (closeModal)="showRules.set(false)"></app-game-rules-modal>

  @if (gameStateService.winner(); as winnerColor) {
  <app-victory-overlay
    [color]="winnerColor"
    [name]="winnerName()"
    [isWinner]="gameStateService.myPlayerColor() === winnerColor || gameStateService.myPlayerColor() === null"
    [byDefault]="gameStateService.winReason() === 'win_by_default'"
    [isGuest]="isLocalPlayerGuest()"
    [pointsDelta]="gameStateService.gameStats()?.pointsDelta ?? null"
    [newPoints]="gameStateService.gameStats()?.newPoints ?? null"
    [newRanking]="gameStateService.gameStats()?.newRanking ?? null"
    (backToMenu)="backToMenu()"
  ></app-victory-overlay>
  }

</div>
